services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobai_dev
      POSTGRES_USER: jobai
      POSTGRES_PASSWORD: jobai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
