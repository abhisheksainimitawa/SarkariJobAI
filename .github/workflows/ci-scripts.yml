name: CI — Scripts
on:
  push:
    paths:
      - 'scripts/**'
      - 'packages/schema/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt && pip install -e packages/schema && pip install pytest
      - run: pytest tests/scripts -v
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
